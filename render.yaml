services:
  - type: web
    name: route-resilience-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MODEL_DOWNLOAD_URL
        value: ""   # <-- paste your direct .pt download URL here (Google Drive, Hugging Face, etc.)
    autoDeploy: true
